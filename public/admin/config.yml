backend:
  name: github
  repo: "" # e.g. "username/homepage"
  branch: main

media_folder: "public/images"
# 公開URLのプレフィックス。CMSが本文に挿入する画像パス（例: /homepage/images/x.png）に使う。
# base変更時は astro.config.mjs の base と必ず揃えること。
# 本文は表示ページの階層が可変なため絶対URLが必須で、favicon のような相対パス化・自動追従ができない。
public_folder: "/your-repo/images"

collections:
  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Tags", name: "tags", widget: "list", default: [] }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "URL", name: "url", widget: "string", required: false }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }
